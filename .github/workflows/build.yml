name: Build APK

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: android-actions/setup-android@v3

      - name: Install Capacitor deps
        run: npm install @capacitor/core @capacitor/cli @capacitor/android @capacitor/filesystem @capacitor/app @capacitor/browser

      - name: Add Android platform (if not already present)
        run: |
          if [ ! -d "android" ]; then
            npx cap add android
          fi

      - name: Add deep link intent filter for GitHub OAuth
        run: |
          MANIFEST="android/app/src/main/AndroidManifest.xml"
          python3 -c "
          import re
          with open('$MANIFEST') as f: content = f.read()
          filter_block = '''<intent-filter>
                  <action android:name=\"android.intent.action.VIEW\" />
                  <category android:name=\"android.intent.category.DEFAULT\" />
                  <category android:name=\"android.intent.category.BROWSABLE\" />
                  <data android:scheme=\"com.vscodegodmode.app\" />
              </intent-filter>'''
          content = content.replace('</activity>', filter_block + '\n        </activity>', 1)
          with open('$MANIFEST', 'w') as f: f.write(content)
          "

      - name: Sync web assets into native project
        run: npx cap sync android

      - name: Build debug APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - uses: actions/upload-artifact@v4
        with:
          name: vscode-god-mode-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk